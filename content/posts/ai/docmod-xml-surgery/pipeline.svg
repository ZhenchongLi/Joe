<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- .docx -->
  <rect x="10" y="50" width="90" height="50" rx="8" fill="#4a9eff" stroke="#357abd" stroke-width="1.5"/>
  <text x="55" y="80" text-anchor="middle" fill="#fff" font-weight="bold">.docx</text>

  <!-- Arrow: docx -> flat HTML -->
  <line x1="100" y1="75" x2="145" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="123" y="67" text-anchor="middle" fill="#666" font-size="11">读取</text>

  <!-- Flat HTML -->
  <rect x="148" y="40" width="120" height="70" rx="8" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <text x="208" y="68" text-anchor="middle" fill="#333" font-weight="bold">扁平 HTML</text>
  <text x="208" y="88" text-anchor="middle" fill="#666" font-size="11">+ ID 映射表</text>

  <!-- Arrow: HTML -> AI -->
  <line x1="268" y1="75" x2="318" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="293" y="67" text-anchor="middle" fill="#666" font-size="11">AI 阅读</text>

  <!-- AI -->
  <rect x="321" y="50" width="80" height="50" rx="8" fill="#f39c12" stroke="#d4861a" stroke-width="1.5"/>
  <text x="361" y="80" text-anchor="middle" fill="#fff" font-weight="bold">AI</text>

  <!-- Arrow: AI -> Changes -->
  <line x1="401" y1="75" x2="450" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="426" y="67" text-anchor="middle" fill="#666" font-size="11">只输出变更</text>

  <!-- Changes Fragment -->
  <rect x="453" y="50" width="110" height="50" rx="8" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <text x="508" y="80" text-anchor="middle" fill="#333" font-weight="bold">变更片段</text>

  <!-- Arrow: Changes -> Patch -->
  <line x1="563" y1="75" x2="618" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="590" y="67" text-anchor="middle" fill="#666" font-size="11">对比基线</text>

  <!-- Patch Engine -->
  <rect x="621" y="50" width="120" height="50" rx="8" fill="#9b59b6" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="681" y="80" text-anchor="middle" fill="#fff" font-weight="bold">Patch 引擎</text>

  <!-- Arrow: docx -> Patch (curved below) -->
  <path d="M 55 100 L 55 135 L 681 135 L 681 100" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="368" y="150" text-anchor="middle" fill="#4a9eff" font-size="11">原始 XML</text>

  <!-- Arrow: Patch -> docx' -->
  <line x1="741" y1="75" x2="790" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="766" y="67" text-anchor="middle" fill="#666" font-size="11">XML 手术</text>

  <!-- .docx' -->
  <rect x="793" y="50" width="90" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="838" y="80" text-anchor="middle" fill="#fff" font-weight="bold">.docx'</text>
</svg>
