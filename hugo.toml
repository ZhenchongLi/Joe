baseURL = "https://fists.cc/"
relativeURLs = true
languageCode = 'zh-cn'
title = 'Joe'
theme = 'PaperMod'

# Custom output formats for AI agent readability
[outputFormats]
  [outputFormats.llmstxt]
    name = "llmstxt"
    mediaType = "text/plain"
    baseName = "llms"
    path = ""
    isPlainText = true
    notAlternative = true

  [outputFormats.llmsfull]
    name = "llmsfull"
    mediaType = "text/plain"
    baseName = "llms-full"
    path = ""
    isPlainText = true
    notAlternative = true

  # Markdown for Agents: a text/markdown representation of each page,
  # served on `Accept: text/markdown` via the Netlify edge function.
  [outputFormats.markdown]
    name = "markdown"
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true
    notAlternative = true

# Add llmstxt/llmsfull to the home page, and markdown to home + every post
[outputs]
  home = ["HTML", "RSS", "llmstxt", "llmsfull", "markdown"]
  page = ["HTML", "markdown"]

[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block = [["$$", "$$"]]
    inline = [["$", "$"], ["\\(", "\\)"]]

[imaging]
# 默认重采样过滤器，用于调整大小
resampleFilter = "box"
# 默认JPEG质量设置，默认为75
quality = 75
# 裁剪图片时使用的锚点，默认为"smart"
anchor = "smart"
# 默认背景色（用于不支持透明度的格式）
bgColor = "#ffffff"

[menu]
  [[menu.main]]
    identifier = "cat-ai"
    name = "AI"
    url = "/categories/ai/"
    weight = 10

  [[menu.main]]
    identifier = "cat-sutskever-30"
    name = "Sutskever 30"
    url = "/categories/sutskever-30/"
    weight = 15

  [[menu.main]]
    identifier = "cat-products"
    name = "Products"
    url = "/categories/products/"
    weight = 20
