baseURL = "https://fists.cc/"
relativeURLs = true
languageCode = 'zh-cn'
title = 'Joe'
theme = 'PaperMod'

# Custom output format for llms.txt
[outputFormats]
  [outputFormats.llmstxt]
    name = "llmstxt"
    mediaType = "text/plain"
    baseName = "llms"
    path = ""
    isPlainText = true
    notAlternative = true

# Add llmstxt to home page outputs
[outputs]
  home = ["HTML", "RSS", "llmstxt"]

[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block = [["$$", "$$"]]
    inline = [["$", "$"], ["\\(", "\\)"]]

[imaging]
# 默认重采样过滤器，用于调整大小
resampleFilter = "box"
# 默认JPEG质量设置，默认为75
quality = 75
# 裁剪图片时使用的锚点，默认为"smart"
anchor = "smart"
# 默认背景色（用于不支持透明度的格式）
bgColor = "#ffffff"

[menu]
  [[menu.main]]
    identifier = "cat-ai"
    name = "AI"
    url = "/categories/ai/"
    weight = 10

  [[menu.main]]
    identifier = "cat-sutskever-30"
    name = "Sutskever 30"
    url = "/categories/sutskever-30/"
    weight = 15

  [[menu.main]]
    identifier = "cat-products"
    name = "Products"
    url = "/categories/products/"
    weight = 20
